<div class="search-tab">
  <div class="search-tab__inner">
    <h1 class="search-tab__title">Discover Research Literature</h1>
    <p class="search-tab__subtitle">
      Search across OpenAlex, Semantic Scholar, arXiv, PubMed, DBLP, CrossRef, Europe PMC and CORE — open source, no subscription required.
    </p>

    <div class="search-tab__search">
      <app-prompt-keywords (generated)="onKeywordsGenerated($event)" />
      <app-query-input
        [initialQuery]="state.rawQuery()"
        [loading]="state.loading()"
        (search)="onSearch($event)"
      />
    </div>

    <label class="demo-toggle" title="Use bundled sample data instead of live APIs">
      <span class="demo-toggle__label">Demo mode</span>
      <span
        class="demo-toggle__track"
        [class.demo-toggle__track--on]="demo.enabled()"
        (click)="demo.toggle()"
      >
        <span class="demo-toggle__thumb"></span>
      </span>
    </label>
  </div>
</div>
