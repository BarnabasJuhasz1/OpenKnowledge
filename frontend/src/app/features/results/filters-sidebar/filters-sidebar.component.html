<aside class="sidebar">
  <div class="sidebar__header">
    <h3 class="sidebar__title">
      <svg xmlns="http://www.w3.org/2000/svg" width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polygon points="22 3 2 3 10 12.46 10 19 14 21 14 12.46 22 3"/></svg>
      Filters &amp; Sort
    </h3>
    @if (hasActiveFilters) {
      <button class="sidebar__reset" (click)="resetAll()">Reset</button>
    }
  </div>

  <!-- Sort -->
  <section class="sidebar__section">
    <h4 class="sidebar__label">Sort by</h4>
    <select class="sidebar__select" [(ngModel)]="sortField">
      <option value="relevancy">OK-score (highest)</option>
      <option value="year_desc">Year (newest)</option>
      <option value="year_asc">Year (oldest)</option>
      <option value="citations_desc">Citations (most)</option>
      <option value="citations_asc">Citations (fewest)</option>
      <option value="title_asc">Title (A–Z)</option>
    </select>
  </section>

  <!-- Year range -->
  <section class="sidebar__section">
    <h4 class="sidebar__label">Year range</h4>
    <div class="sidebar__range-labels">
      <span>{{ yearMin }}</span>
      <span>{{ yearMax }}</span>
    </div>
    <div class="sidebar__range-row">
      <input
        type="range"
        class="sidebar__slider"
        [min]="state.yearRange().min"
        [max]="state.yearRange().max"
        [ngModel]="yearMin"
        (ngModelChange)="yearMin = $event"
      />
      <input
        type="range"
        class="sidebar__slider"
        [min]="state.yearRange().min"
        [max]="state.yearRange().max"
        [ngModel]="yearMax"
        (ngModelChange)="yearMax = $event"
      />
    </div>
  </section>

  <!-- Citation range -->
  <section class="sidebar__section">
    <h4 class="sidebar__label">Citation count</h4>
    <div class="sidebar__range-labels">
      <span>{{ citationMin }}</span>
      <span>{{ citationMax }}</span>
    </div>
    <div class="sidebar__range-row">
      <input
        type="range"
        class="sidebar__slider"
        [min]="0"
        [max]="state.citationRange().max"
        [ngModel]="citationMin"
        (ngModelChange)="citationMin = $event"
      />
      <input
        type="range"
        class="sidebar__slider"
        [min]="0"
        [max]="state.citationRange().max"
        [ngModel]="citationMax"
        (ngModelChange)="citationMax = $event"
      />
    </div>
  </section>

  <!-- Toggle filters -->
  <section class="sidebar__section">
    <h4 class="sidebar__label">Show only</h4>
    <label class="sidebar__toggle">
      <input type="checkbox" [(ngModel)]="codeOnly" />
      <span class="sidebar__toggle-text">
        <svg xmlns="http://www.w3.org/2000/svg" width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="16 18 22 12 16 6"/><polyline points="8 6 2 12 8 18"/></svg>
        Has code
      </span>
    </label>
    <label class="sidebar__toggle">
      <input type="checkbox" [(ngModel)]="peerReviewedOnly" />
      <span class="sidebar__toggle-text">
        <svg xmlns="http://www.w3.org/2000/svg" width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M22 11.08V12a10 10 0 1 1-5.93-9.14"/><polyline points="22 4 12 14.01 9 11.01"/></svg>
        Peer reviewed
      </span>
    </label>
    <label class="sidebar__toggle">
      <input type="checkbox" [(ngModel)]="openAccessOnly" />
      <span class="sidebar__toggle-text">
        <svg xmlns="http://www.w3.org/2000/svg" width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="11" width="18" height="11" rx="2" ry="2"/><path d="M7 11V7a5 5 0 0 1 9.9-1"/></svg>
        Open access
      </span>
    </label>
  </section>
</aside>
