<div class="card">
  <!-- Title row -->
  <div class="card__top">
    <h2 class="card__title">{{ paper.title }}</h2>
    <div class="card__meta">
      <span class="card__year">{{ displayYear }}</span>
      <button
        class="card__btn"
        [class.card__btn--copied]="bibtexCopied()"
        [disabled]="!paper.bibtex"
        (click)="copyBibtex()"
        title="Copy BibTeX citation"
        aria-label="Copy BibTeX"
      >
        @if (bibtexCopied()) {
          <svg xmlns="http://www.w3.org/2000/svg" width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="20 6 9 17 4 12"/></svg>
        } @else {
          <svg xmlns="http://www.w3.org/2000/svg" width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="9" y="9" width="13" height="13" rx="2"/><path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"/></svg>
        }
      </button>
      <button
        class="card__btn"
        [disabled]="!hasPdf"
        (click)="openPdf()"
        title="Open PDF"
        aria-label="Open PDF"
      >
        <svg xmlns="http://www.w3.org/2000/svg" width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/></svg>
      </button>
    </div>
  </div>

  <!-- Authors -->
  @if (authorLine) {
    <p class="card__authors">{{ authorLine }}</p>
  }

  <!-- Venue / journal -->
  @if (paper.journal || paper.venue) {
    <p class="card__venue">{{ paper.journal || paper.venue }}</p>
  }

  <!-- Abstract toggle -->
  @if (paper.abstract) {
    <button class="card__abstract-toggle" (click)="toggleAbstract()" aria-expanded="abstractExpanded()">
      <svg
        class="card__chevron"
        [class.card__chevron--open]="abstractExpanded()"
        xmlns="http://www.w3.org/2000/svg" width="13" height="13" viewBox="0 0 24 24"
        fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"
      >
        <polyline points="6 9 12 15 18 9"/>
      </svg>
      Abstract
    </button>

    <div class="card__abstract-body" [class.card__abstract-body--open]="abstractExpanded()">
      <p class="card__abstract-text">{{ paper.abstract }}</p>
    </div>
  }
</div>
