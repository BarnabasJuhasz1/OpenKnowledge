<div class="relevancy">
  <nav class="relevancy__tabs">
    <button
      class="relevancy__tab"
      [class.relevancy__tab--active]="activeTab() === 'discovery'"
      (click)="setTab('discovery')"
    >Discovery</button>
    <button
      class="relevancy__tab"
      [class.relevancy__tab--active]="activeTab() === 'analysis'"
      (click)="setTab('analysis')"
    >Analysis</button>
  </nav>

  <main class="relevancy__body">
    @if (activeTab() === 'discovery') {
      <app-discovery-tab
        [weights]="weights()"
        (weightsChange)="onWeightsChange($event)"
      />
    }
    @if (activeTab() === 'analysis') {
      <app-analysis-tab [weights]="weights()" />
    }
  </main>
</div>
