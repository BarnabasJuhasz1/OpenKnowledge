<div class="relevancy">
  <header class="relevancy__header">
    <a class="relevancy__logo" routerLink="/">
      <img class="relevancy__logo-icon" src="openknowledge_icon.svg" alt="" />
      OpenKnowledge
    </a>
    <nav class="relevancy__nav">
      <a class="relevancy__nav-link" routerLink="/">Research</a>
      <a class="relevancy__nav-link relevancy__nav-link--active" routerLink="/relevancy">OK-score</a>
      <a class="relevancy__nav-link" routerLink="/graph">Graph</a>
      <a class="relevancy__nav-link" routerLink="/library">Library</a>
      <a class="relevancy__nav-link" routerLink="/citgraph">Cit-Graph</a>
    </nav>
    <nav class="relevancy__tabs">
      <button
        class="relevancy__tab"
        [class.relevancy__tab--active]="activeTab() === 'discovery'"
        (click)="setTab('discovery')"
      >Discovery</button>
      <button
        class="relevancy__tab"
        [class.relevancy__tab--active]="activeTab() === 'analysis'"
        (click)="setTab('analysis')"
      >Analysis</button>
    </nav>
  </header>

  <main class="relevancy__body">
    @if (activeTab() === 'discovery') {
      <app-discovery-tab
        [weights]="weights()"
        (weightsChange)="onWeightsChange($event)"
      />
    }
    @if (activeTab() === 'analysis') {
      <app-analysis-tab [weights]="weights()" />
    }
  </main>
</div>
