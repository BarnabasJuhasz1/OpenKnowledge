<div class="dashboard" [class.dashboard--collapsed]="collapsed()">
  <aside class="dashboard__sidebar">
    <!-- Collapse / expand toggle -->
    <button
      type="button"
      class="dashboard__collapse-btn"
      (click)="toggleCollapse()"
      [attr.aria-expanded]="!collapsed()"
      [attr.aria-label]="collapsed() ? 'Expand sidebar' : 'Collapse sidebar'"
      [title]="collapsed() ? 'Expand sidebar' : 'Collapse sidebar'"
    >
      <span class="material-symbols-outlined dashboard__nav-icon">
        {{ collapsed() ? 'chevron_right' : 'chevron_left' }}
      </span>
    </button>

    <!-- Top-level tabs -->
    <nav class="dashboard__top" aria-label="Dashboard">
      <a
        class="dashboard__nav-link"
        routerLink="/dashboard/home"
        routerLinkActive="dashboard__nav-link--active"
        [title]="collapsed() ? 'Dashboard' : null"
      >
        <span class="material-symbols-outlined dashboard__nav-icon">dashboard</span>
        <span class="dashboard__nav-label">Dashboard</span>
      </a>
      <a
        class="dashboard__nav-link"
        routerLink="/dashboard/projects"
        routerLinkActive="dashboard__nav-link--active"
        [title]="collapsed() ? 'My Projects' : null"
      >
        <span class="material-symbols-outlined dashboard__nav-icon">folder_open</span>
        <span class="dashboard__nav-label">My Projects</span>
      </a>
    </nav>

    <hr class="dashboard__divider" />

    <!-- Active project + its features -->
    @if (activeProject(); as project) {
      <div
        class="dashboard__active"
        aria-hidden="false"
        [title]="collapsed() ? project.name : null"
      >
        <span
          class="dashboard__active-dot"
          [style.background]="project.color || 'var(--ok-primary-raw)'"
        ></span>
        <span class="dashboard__active-name">{{ project.name }}</span>
      </div>
      <nav class="dashboard__nav" aria-label="Project features">
        @for (feature of features; track feature.path) {
          <a
            class="dashboard__nav-link dashboard__nav-link--feature"
            [routerLink]="featureLink(feature.path)"
            routerLinkActive="dashboard__nav-link--active"
            [title]="collapsed() ? feature.label : null"
          >
            <span class="material-symbols-outlined dashboard__nav-icon">{{ feature.icon }}</span>
            <span class="dashboard__nav-label">{{ feature.label }}</span>
          </a>
        }
      </nav>
    } @else {
      <p class="dashboard__no-project">
        No project selected.
        <a routerLink="/dashboard/projects">Choose a project</a> to use its
        features.
      </p>
    }

    <!-- Settings (pinned to the bottom of the sidebar) -->
    <nav class="dashboard__settings" aria-label="Settings">
      <hr class="dashboard__divider" />
      <a
        class="dashboard__nav-link"
        routerLink="/dashboard/settings"
        routerLinkActive="dashboard__nav-link--active"
        [title]="collapsed() ? 'Settings' : null"
      >
        <span class="material-symbols-outlined dashboard__nav-icon">settings</span>
        <span class="dashboard__nav-label">Settings</span>
      </a>
    </nav>
  </aside>

  <section class="dashboard__content">
    <router-outlet />
  </section>
</div>
